model:
  name: qwen3_8b_it
  path: Qwen/Qwen3-8B
  type: causal_lm
  architecture:
    hidden_size: 4096
    num_attention_heads: 32
    num_key_value_heads: 8
    num_layers: 36
    vocab_size: 151936
  generation:
    max_new_tokens: 512
    temperature: 0.7
    top_p: 0.9
    do_sample: true
encoder:
  name: esm3_small
  model_name: esm3-sm-open-v1
  encoder_type: esm3
  embedding_dim: 1536
  num_layers: 48
  freeze: true
  dtype: bfloat16
  encoder_batch_size: 4
  pooling:
    method: attention
    num_output_tokens: 32
    num_heads: 8
    dropout: 0.1
    layer_norm: true
  projector:
    type: mlp
    input_dim: 1536
    hidden_dim: 5120
    output_dim: 4096
    num_layers: 2
    activation: gelu
    dropout: 0.1
    perceiver_layers: 2
    perceiver_heads: 8
    perceiver_ffn_dim: 2048
    perceiver_latent_dim: 1024
data:
  name: mol_instructions
  source: zjunlp/Mol-Instructions
  subset: Protein-oriented Instructions
  task: sft
  paths:
    raw: ./data/raw/mol_instructions
    processed: ./data/processed/mol_instructions
  processing:
    max_seq_length: 2048
    include_structure: false
    max_protein_length: 1024
  splits:
    train: 0.95
    validation: 0.025
    test: 0.025
  limit: null
training:
  method: sft_lora
  framework: trl
  quantization:
    enabled: false
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
    bias: none
    task_type: CAUSAL_LM
  freeze_lora: false
  lr: 0.0001
  projector_lr: 0.0005
  epochs: 3
  batch_size: 16
  gradient_accumulation_steps: 4
  max_seq_length: 2048
  packing_sequences: false
  max_tokens_per_batch: 6144
  max_batch_size: 12
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  weight_decay: 0.01
  optimizer:
    type: adamw
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
  lr_scheduler:
    type: cosine
    num_warmup_steps: 100
  freeze_lora_steps: 500
  save_strategy: steps
  save_steps: 250
  save_total_limit: 3
  logging_steps: 10
  eval_steps: 250
  wandb:
    project: protein-llm-sft
    tags:
    - sft_lora
    - esm3_mlp
    - qwen3_8b_it
approach: esm3
experiment_name: sft_lora_esm3_qwen3_8b_it_0225_155037
project_name: protein_llm
