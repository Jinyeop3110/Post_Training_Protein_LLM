method: sft_qlora
framework: trl  # trl or verl

# QLoRA quantization
quantization:
  enabled: true
  bits: 4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

# LoRA configuration - k/v only for proteins
lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - k_proj
    - v_proj
  bias: none
  task_type: CAUSAL_LM

# Training parameters
lr: 2e-4
epochs: 3
batch_size: 8
gradient_accumulation_steps: 4
max_seq_length: 2048
warmup_ratio: 0.03
max_grad_norm: 1.0
weight_decay: 0.01

# Optimizer
optimizer:
  type: adamw_8bit
  betas: [0.9, 0.999]
  eps: 1e-8

lr_scheduler:
  type: cosine
  num_warmup_steps: 100

# Checkpointing
save_strategy: steps
save_steps: 500
save_total_limit: 3

# Logging
logging_steps: 10
eval_steps: 100
