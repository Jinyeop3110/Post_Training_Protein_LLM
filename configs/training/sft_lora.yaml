method: sft_lora
framework: trl

# No quantization (full precision LoRA)
quantization:
  enabled: false

# LoRA configuration - attention + MLP projections for expressiveness
lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

# Two-stage training: set freeze_lora=true for stage 1 (alignment)
# Stage 1: freeze LoRA, train only projector+pooling
# Stage 2: unfreeze LoRA (default), train everything
freeze_lora: false

# Training parameters
lr: 2e-4
projector_lr: 2e-3  # 10x base LR for randomly-initialized pooling + projector
epochs: 3
batch_size: 16  # DDP-optimized for Qwen3-4B on H100 80GB
gradient_accumulation_steps: 4
max_seq_length: 2048
packing_sequences: false  # Concatenation+packing: pack multiple examples into fixed-length blocks
max_tokens_per_batch: null  # Token budget per micro-batch (e.g., 8192). null = use fixed batch_size
max_batch_size: 16          # Cap samples per micro-batch when using token budget
warmup_ratio: 0.03
max_grad_norm: 1.0
weight_decay: 0.01

# Optimizer
optimizer:
  type: adamw
  betas: [0.9, 0.999]
  eps: 1e-8

lr_scheduler:
  type: cosine
  num_warmup_steps: 100

# Projector alignment: freeze LoRA for first N steps so the randomly-
# initialized projector learns a basic embedding mapping before the LLM
# adapts. After N steps, LoRA unfreezes and both train jointly.
# 0 = no freeze (default for base config; experiment configs override)
freeze_lora_steps: 0

# Checkpointing
save_strategy: steps
save_steps: 500
save_total_limit: 3

# Logging
logging_steps: 10
eval_steps: 500

# wandb settings (override global logging.wandb)
wandb:
  project: protein-llm-sft
  tags:
    - sft_lora
    - ${model.name}
    - mol_instructions
