method: grpo
framework: verl

# GRPO-specific settings
grpo:
  group_size: 4          # Number of completions per prompt
  temperature: 1.0
  use_kl_penalty: false  # DAPO improvement
  normalize_advantages: false  # Dr. GRPO improvement

# Quantization (disabled for GRPO — FSDP2 incompatible with bitsandbytes)
quantization:
  enabled: false

# Training parameters
lr: 5e-6  # Much lower than SFT!
projector_lr: 2e-5  # 10x base LR for pooling+projector (randomly initialized)
epochs: 1
batch_size: 4
gradient_accumulation_steps: 8
max_seq_length: 2048
max_grad_norm: 1.0

# LoRA (same as SFT)
lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# Rollout settings
rollout:
  engine: vllm
  temperature: 1.0
  top_p: 0.95
  max_tokens: 512

# Checkpointing
save_steps: 100
eval_steps: 50

# Logging
logging_steps: 10

# wandb settings (override global logging.wandb)
wandb:
  project: protein-llm-rl
  tags:
    - grpo
    - ${model.name}
    - mol_instructions
