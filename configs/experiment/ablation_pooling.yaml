# @package _global_

# Ablation study comparing pooling methods
# Run with: python scripts/train.py --multirun experiment=ablation_pooling encoder.pooling.method=attention,mean,cls

defaults:
  - override /model: qwen2_7b
  - override /encoder: esm2_650m
  - override /data: mol_instructions
  - override /training: sft_qlora

experiment_name: ablation_pooling_${encoder.pooling.method}_${now:%Y%m%d_%H%M%S}

# Shorter training for ablation
training:
  epochs: 1
  lr: 2e-4
