# @package _global_

# SFT experiment: Text-only approach (Combined SFT Dataset)
# Raw protein sequence as <protein>MKTL...</protein> tokens to LLM
# Trainable: ~2M params (LoRA only, no pooling/projector)
#
# Uses combined_sft_260225: 4.7M records from 6 sources
# (Mol-Instructions, Swiss-Prot, ProteinLMDataset, SwissProtCLAP, ProtDescribe, Protein2Text-QA)
#
# Usage: python scripts/train.py experiment=sft_text_combined

defaults:
  - override /model: qwen3_8b
  - override /encoder: esm3_small  # Ignored when approach=text, but Hydra needs it
  - override /data: combined_sft_260225
  - override /training: sft_lora

approach: text
experiment_name: sft_text_combined_${model.name}_${now:%m%d_%H%M%S}

# Text-only: exclude protein_design is still appropriate (garbled text input)
# The exclude_files in the data config handles this

training:
  # Text-only: no projector, so no differential LR needed
  lr: 2e-4
  projector_lr: null

  # Token-budget dynamic batching
  # Text approach: protein seq becomes raw tokens (~1 token/AA), so sequences
  # are much longer than ESM-3 path (32 pooled tokens). Smaller budget needed.
  max_tokens_per_batch: 8192
  max_batch_size: 16
  gradient_accumulation_steps: 4
  eval_batch_size: 4              # Fixed eval batch — avoids eval OOM

  freeze_lora_steps: 0

  epochs: 3
  max_seq_length: 2048

  save_steps: 250
  eval_steps: 250

  wandb:
    tags:
      - sft_lora
      - text_only
      - combined_sft
      - fsdp
      - ${model.name}

evaluation:
  name: sft_combined
