# @package _global_

# SFT experiment: ESM-3 + MLP Projector (Combined SFT Dataset)
# Frozen ESM-3 small (1536-dim, float32) -> AttentionPooling (32 tokens) -> MLP Projector (hidden=5120) -> LLM
# Trainable: ~32.5M params (LoRA ~2M + pooling ~9.5M + projector ~21.0M)
#
# Uses combined_sft_260225: 4.89M records from 6 sources
# (Mol-Instructions, Swiss-Prot, ProteinLMDataset, SwissProtCLAP, ProtDescribe, Protein2Text-QA)
#
# FSDP shards LLM across 8 GPUs (~16 GB→2 GB/GPU), freeing memory for
# larger batches. embed_tokens weights are cached before sharding.
#
# Usage: bash scripts/launch_train.sh experiment=sft_esm3_mlp_combined

defaults:
  - override /model: qwen3_8b
  - override /encoder: esm3_small
  - override /data: combined_sft_260225
  - override /training: sft_lora

approach: esm3
experiment_name: sft_esm3_mlp_combined_${model.name}_${now:%m%d_%H%M%S}

# Force MLP projector (default, but explicit for clarity)
encoder:
  # encoder_batch_size=4: process 4 proteins through ESM-3 at once.
  # ESM-3 geom_attn is O(L²); sub-batches of 4 keep peak ~4 GB.
  # Higher values cause attention mask shape mismatches with mixed-length proteins.
  encoder_batch_size: 4
  projector:
    type: mlp

# Cap protein length to avoid ESM-3 geometric attention OOM on long seqs
# ESM-3 geom_attn is O(L²): 1024 AA ≈ 4 GB, 2048 AA ≈ 16 GB
data:
  processing:
    max_protein_length: 1024

training:
  # Differential LR: projector trains from random init, needs higher LR
  lr: 2e-4
  projector_lr: 1e-3  # 5x base LR

  # Token-budget dynamic batching: short seqs → large batch, long seqs → small batch
  # FSDP shard_grad_op (ZeRO-2): keeps full params, shards grads+optimizer.
  # ESM-3 encoder sub-batches independently (encoder.encoder_batch_size).
  max_tokens_per_batch: 8192
  max_batch_size: 16
  gradient_accumulation_steps: 4  # effective batch ~262K tokens (8 GPUs × 4 accum × 8192)
  eval_batch_size: 4

  freeze_lora_steps: 0

  epochs: 3
  max_seq_length: 2048

  # Checkpoint every 250 steps (was 500) — less progress lost on crash
  save_steps: 250
  eval_steps: 250

  wandb:
    tags:
      - sft_lora
      - esm3_mlp
      - combined_sft
      - fsdp
      - ${model.name}

evaluation:
  name: sft_combined
