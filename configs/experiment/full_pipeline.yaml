# @package _global_

# Full SFT + GRPO pipeline
# Run Phase 1 first, then Phase 2

defaults:
  - override /model: qwen2_7b
  - override /encoder: esm2_650m
  - override /data: mol_instructions

experiment_name: full_pipeline_${now:%Y%m%d_%H%M%S}

# Phase 1: SFT settings (use with training=sft_qlora)
phase1:
  training:
    method: sft_qlora
    epochs: 3
    lr: 2e-4

# Phase 2: GRPO settings (use with training=grpo)
phase2:
  training:
    method: grpo
    epochs: 1
    lr: 5e-6
    resume_from: ${paths.checkpoint_dir}/phase1/best
