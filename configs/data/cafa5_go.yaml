name: cafa5_go
source: CAFA5
task: go_prediction  # Task type for reward routing in GRPOTrainer

# Dataset paths
paths:
  raw: ${paths.raw_dir}/cafa5_go
  processed: ${paths.processed_dir}/cafa5_go

# Processing settings
processing:
  max_seq_length: 2048
  include_structure: false

# Split ratios
splits:
  train: 0.9
  validation: 0.05
  test: 0.05

# Optional: limit number of samples (null = use all)
limit: null
