name: mol_instructions
source: zjunlp/Mol-Instructions
subset: Protein-oriented Instructions
task: sft  # Task type for reward routing (sft | go_prediction | stability | esmfold)

# Dataset paths
paths:
  raw: ${paths.raw_dir}/mol_instructions
  processed: ${paths.processed_dir}/mol_instructions

# Processing settings
processing:
  max_seq_length: 2048
  include_structure: false
  max_protein_length: null  # Max protein AA length (null = no limit, drops samples if set)

# Split ratios
splits:
  train: 0.95
  validation: 0.025
  test: 0.025

# Optional: limit number of samples (null = use all)
limit: null
