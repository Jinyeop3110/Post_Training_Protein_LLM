# Qwen3-14B is a unified base+instruct model (no separate -Instruct variant
# on HuggingFace, unlike Qwen3-4B-Instruct-2507).
name: qwen3_14b_it
path: Qwen/Qwen3-14B
type: causal_lm

architecture:
  hidden_size: 5120
  num_attention_heads: 40
  num_key_value_heads: 8
  num_layers: 40
  vocab_size: 151643

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  do_sample: true
