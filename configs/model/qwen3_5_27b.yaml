# Qwen3.5-27B: Hybrid architecture (Gated DeltaNet + Gated Attention)
# Natively multimodal with 262K context, Apache 2.0 license
# Same hidden_size as Qwen3-14B (5120) — projector dims unchanged
# REQUIRES: transformers >= 5.0.0 (model_type: qwen3_5)
# Memory: ~54 GB in bf16, fits 8×H100 with FSDP
name: qwen3_5_27b
path: Qwen/Qwen3.5-27B
type: causal_lm

architecture:
  hidden_size: 5120
  num_attention_heads: 24
  num_key_value_heads: 4
  num_layers: 64
  vocab_size: 248320
  intermediate_size: 17408

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.9
  do_sample: true
