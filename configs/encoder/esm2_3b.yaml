name: esm2_3b
model_name: esm2_t36_3B_UR50D
embedding_dim: 2560
num_layers: 36

# Always frozen - CRITICAL
freeze: true

# Pooling strategy
pooling:
  method: attention
  window_size: 80

# Projector settings
projector:
  type: mlp
  hidden_dim: 3072
  output_dim: ${model.architecture.hidden_size}
  num_layers: 2
  activation: gelu
  dropout: 0.1
